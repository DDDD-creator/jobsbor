# ═══════════════════════════════════════════════════════════════
# 网站抓取配置
# ═══════════════════════════════════════════════════════════════

web_scraping:
  enabled: true
  sources:
    # 通过搜索引擎结果发现网站
    search_engine_discovery:
      enabled: true
      queries:
        - "site:*.com 成人漫画"
        - "site:*.cn 漫画网站"
        - "site:*.net H漫"
        - "intitle:漫画 在线"
        - "inurl:comic 成人"
      max_results_per_query: 50
      delay_between_queries: 3s
    
    # 从已知网站提取外链
    link_extraction:
      enabled: true
      seed_sites:
        - "https://example-comic-portal.com"
        - "https://comic-directory.example"
      max_depth: 2
      same_domain_only: false
  
  rate_limits:
    requests_per_minute: 20
    respect_robots_txt: true
    user_agent: "Mozilla/5.0 (compatible; LeadHunter/1.0; +https://example.com/bot)"

# ═══════════════════════════════════════════════════════════════
# 数据源优先级
# ═══════════════════════════════════════════════════════════════

source_priority:
  1: manual_list      # 手动列表最可靠
  2: custom_rss       # 自定义RSS次之
  3: web_scraping     # 网页抓取
  4: twitter          # 社交媒体
  5: github           # 代码平台

# ═══════════════════════════════════════════════════════════════
# 数据过滤规则
# ═══════════════════════════════════════════════════════════════

filters:
  # 网站质量过滤
  website_quality:
    min_alexa_rank: null      # 不限制最低排名
    max_alexa_rank: 1000000   # 排除排名太差的网站
    min_monthly_visitors: 1000
    must_have_ssl: true
    must_be_active: true      # 最近30天有更新
    
  # 内容过滤
  content_filters:
    must_contain_keywords:
      - "漫画"
      - "comic"
      - "图"
    should_contain_keywords:
      - "成人"
      - "二次元"
      - "H"
    exclude_keywords:
      - "赌博"
      - "诈骗"
      - "非法"
      
  # 地理过滤
  geography:
    target_countries:
      - CN
      - TW
      - HK
    target_languages:
      - zh
      - zh-CN
      - zh-TW

# ═══════════════════════════════════════════════════════════════
# 输出配置
# ═══════════════════════════════════════════════════════════════

output:
  format: "json"
  save_to: "/root/.openclaw/workspace/skills/lead-hunter/output/discovered_leads.json"
  batch_size: 100
  deduplicate: true
  
  # 字段映射
  field_mapping:
    source_url: "url"
    source_name: "name"
    discovered_at: "timestamp"
    source_type: "source"