# sources.yaml
# 数据源配置 - 成人漫画网站站长发现

# 启用状态
enabled: true

# ═══════════════════════════════════════════════════════════════
# 社交媒体数据源
# ═══════════════════════════════════════════════════════════════

twitter:
  enabled: false  # 需要API密钥，暂时禁用
  api_version: v2
  credentials:
    bearer_token: ${TWITTER_BEARER_TOKEN}  # 从环境变量获取
  
  discovery_methods:
    # 方法1: 关键词搜索（中文成人内容相关）
    keyword_search:
      queries:
        - "成人漫画 站长"
        - "H漫 网站"
        - "漫画网站 运营"
        - "二次元 成人 内容"
        - "网站流量 变现"
        - "广告合作 寻找"
      filters:
        min_followers: 100
        max_followers: 50000
        verified_only: false
        has_website: true
        account_age_days: 180
        language: "zh"
    
    # 方法2: 竞争对手关注者
    competitor_followers:
      accounts:
        - "漫画相关账号1"  # 需要替换为实际账号
        - "漫画相关账号2"
      sample_size: 500
      filter_by_bio:
        must_contain: ["站长", "运营", "漫画", "网站"]
    
  rate_limits:
    requests_per_15min: 450
    delay_between_requests: 2s

github:
  enabled: false  # 技术型站长，暂时禁用
  credentials:
    token: ${GITHUB_TOKEN}
  
  discovery_methods:
    repository_search:
      queries:
        - "漫画网站"
        - "成人内容"
        - "wordpress 漫画"
      language: "JavaScript,Python,PHP"
      min_stars: 1
      
    user_search:
      queries:
        - "漫画 开发者"
        - "网站 站长"
      location: "China"
      min_followers: 10

# ═══════════════════════════════════════════════════════════════
# 平台数据源
