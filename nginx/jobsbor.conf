# ============================================
# Jobsbor Nginx 配置文件
# ============================================
# 
# 使用说明：
# 1. 把此文件复制到服务器：/etc/nginx/sites-available/jobsbor.conf
# 2. 创建软链接：sudo ln -s /etc/nginx/sites-available/jobsbor.conf /etc/nginx/sites-enabled/
# 3. 测试配置：sudo nginx -t
# 4. 重载Nginx：sudo systemctl reload nginx
#
# ⚠️ 【用户需要修改这里】把 jobsbor.com 换成你的真实域名
# ============================================

# HTTP服务器 - 重定向到HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jobsbor.com www.jobsbor.com;  # 【用户需要修改这里】
    
    # Certbot验证路径（SSL证书申请时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # 所有HTTP请求重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS服务器 - 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jobsbor.com www.jobsbor.com;  # 【用户需要修改这里】

    # ============================================
    # SSL证书配置（Certbot会自动管理）
    # ============================================
    ssl_certificate /etc/letsencrypt/live/jobsbor.com/fullchain.pem;      # 【用户需要修改这里】
    ssl_certificate_key /etc/letsencrypt/live/jobsbor.com/privkey.pem;    # 【用户需要修改这里】
    
    # SSL优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ============================================
    # 日志配置
    # ============================================
    access_log /var/log/nginx/jobsbor.access.log;
    error_log /var/log/nginx/jobsbor.error.log;

    # ============================================
    # Gzip压缩 - 让网页加载更快
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/json 
        application/javascript 
        application/rss+xml 
        application/atom+xml 
        image/svg+xml
        font/woff 
        font/woff2;

    # ============================================
    # 安全响应头
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ============================================
    # 静态文件服务
    # ============================================
    root /var/www/jobsbor/dist;  # 【用户需要修改这里】如果使用其他路径请修改
    index index.html;

    # 静态文件缓存 - 图片/CSS/JS缓存1年
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # HTML文件不缓存（确保内容更新及时生效）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ============================================
    # Next.js静态导出路由处理
    # ============================================
    location / {
        # 尝试匹配文件 -> 匹配.html文件 -> 匹配目录 -> 404
        try_files $uri $uri.html $uri/ =404;
    }

    # ============================================
    # API反向代理（如果使用SSR模式，取消下面的注释）
    # ============================================
    # location /api {
    #     proxy_pass http://localhost:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # ============================================
    # 错误页面
    # ============================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /var/www/jobsbor/dist;
        internal;
    }
}
