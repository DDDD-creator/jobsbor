<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
    <linearGradient id="bag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E5E7EB"/>
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  
  <!-- 公文包 -->
  <rect x="120" y="140" width="160" height="120" rx="12" fill="url(#bag)"/>
  <rect x="120" y="170" width="160" height="8" fill="#1E40AF"/>
  <path d="M160 140 L160 125 Q160 115 170 115 L230 115 Q240 115 240 125 L240 140" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- 中文"职"字 -->
  <text x="200" y="235" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#1E40AF" text-anchor="middle">职</text>
  
  <!-- 装饰圆点 -->
  <circle cx="340" cy="80" r="25" fill="#F59E0B"/>
  <circle cx="60" cy="320" r="18" fill="#10B981"/>
  <circle cx="350" cy="300" r="12" fill="#EF4444"/>
</svg>